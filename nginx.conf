# Nginx 伪静态配置参考
# 将以下规则添加到 Nginx 站点配置的 server {} 块中

location / {
    try_files $uri $uri/ /index.php?$query_string;
}

# 文章详情
location ~ ^/post/([^/]+)/?$ {
    rewrite ^/post/([^/]+)/?$ /single.php?slug=$1 last;
}

# 文章ID访问
location ~ ^/p/(\d+)/?$ {
    rewrite ^/p/(\d+)/?$ /single.php?id=$1 last;
}

# 分类页
location ~ ^/category/([^/]+)/?$ {
    rewrite ^/category/([^/]+)/?$ /category.php?slug=$1 last;
}

# 标签页
location ~ ^/tag/([^/]+)/?$ {
    rewrite ^/tag/([^/]+)/?$ /tag.php?slug=$1 last;
}

# 标签列表
location = /tags {
    rewrite ^/tags/?$ /tags.php last;
}

# 归档页
location = /archive {
    rewrite ^/archive/?$ /archive.php last;
}

# 搜索
location ~ ^/search/(.+)/?$ {
    rewrite ^/search/(.+)/?$ /search.php?q=$1 last;
}

# 友情链接
location = /links {
    rewrite ^/links/?$ /links.php last;
}

# RSS
location = /feed {
    rewrite ^/feed/?$ /feed.php last;
}

# Sitemap
location = /sitemap.xml {
    rewrite ^/sitemap\.xml$ /sitemap.php last;
}

# 独立页面
location ~ ^/page/([^/]+)/?$ {
    rewrite ^/page/([^/]+)/?$ /page.php?slug=$1 last;
}

# 后台美化URL
location /admin/ {
    try_files $uri $uri/ /admin/index.php?$query_string;
}

# 禁止访问敏感目录
location ~ ^/(includes|cache|logs|backups)/ {
    deny all;
}

# 禁止访问配置文件
location ~ (config\.php|install\.lock)$ {
    deny all;
}

# PHP 处理
location ~ \.php$ {
    fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
}
